# DigitalOcean App Platform spec for AURA Browser
# Deploy with: doctl apps create --spec .do/app.yaml
name: aura-browser
region: nyc
static_sites:
  - name: aura
    source_dir: /
    output_dir: dist
    build_command: npm ci && npm run build
    routes:
      - path: /
    catchall_document: index.html
